<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>提瓦特轨道交通网 · 原神风格实时导航版</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap');

* { user-select: none; box-sizing: border-box; margin:0; padding:0; }
body {
  margin:0; padding:0;
  font-family: 'Noto Serif SC', 'HYWenHei', 'Microsoft YaHei', serif;
  background: #0d1b2a;
  overflow:hidden; height:100vh; display:flex; flex-direction:column;
}

/* ===== 顶部工具栏 - 原神风格 ===== */
.toolbar {
  background: linear-gradient(180deg, rgba(13,27,42,0.95) 0%, rgba(20,40,60,0.9) 100%);
  color: #e8dcc8;
  padding: 10px 24px;
  display:flex; justify-content:space-between; align-items:center;
  flex-wrap:wrap; gap:12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
  z-index:20;
  border-bottom: 2px solid #c9a96e;
  position: relative;
}
.toolbar::after {
  content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
  height: 2px; background: linear-gradient(90deg, transparent, #c9a96e, #f0d78c, #c9a96e, transparent);
}
.title { display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
.title h1 {
  margin:0; font-size: 1.35rem; letter-spacing: 3px;
  color: #f0d78c;
  text-shadow: 0 2px 8px rgba(201,169,110,0.4), 0 0 30px rgba(201,169,110,0.15);
  font-weight: 700;
}
.title small {
  font-size: 0.72rem; opacity: 0.7; color: #b8a88a;
  letter-spacing: 1px;
}
.controls { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.genshin-btn {
  background: linear-gradient(180deg, #2a4a6a 0%, #1a3048 100%);
  border: 1.5px solid #c9a96e;
  color: #e8dcc8;
  padding: 7px 16px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.82rem;
  font-weight: 500;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  position: relative;
  overflow: hidden;
  font-family: inherit;
  letter-spacing: 1px;
}
.genshin-btn::before {
  content: ''; position: absolute; top:0; left:-100%; width:100%; height:100%;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.2), transparent);
  transition: left 0.5s;
}
.genshin-btn:hover::before { left: 100%; }
.genshin-btn:hover {
  border-color: #f0d78c;
  color: #f0d78c;
  transform: translateY(-1px);
  box-shadow: 0 4px 15px rgba(201,169,110,0.3);
}
.genshin-btn:active { transform: translateY(1px) scale(0.98); }
.file-label {
  display: inline-block;
  background: linear-gradient(180deg, #4a3a2a 0%, #3a2a1a 100%);
  border-color: #a08060;
}
.file-label:hover { border-color: #c9a96e; }
input#jsonUpload { display: none; }

.clock {
  background: linear-gradient(135deg, rgba(20,40,60,0.8), rgba(30,50,70,0.6));
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-family: 'Noto Serif SC', monospace;
  color: #f0d78c;
  border: 1px solid rgba(201,169,110,0.3);
  letter-spacing: 1px;
}

/* ===== 地图容器 ===== */
#map-container {
  flex:1; position:relative;
  background: linear-gradient(135deg, #c4b896 0%, #d4c8a8 50%, #b8a880 100%);
  overflow:hidden; cursor: grab;
}
#map-container:active { cursor: grabbing; }
svg { display:block; width:100%; height:100%; }

/* ===== 路线规划面板 - 原神风格 ===== */
.route-panel {
  position: absolute; top: 70px; left: 20px;
  width: 380px;
  background: linear-gradient(180deg, rgba(13,27,42,0.92) 0%, rgba(20,35,50,0.88) 100%);
  backdrop-filter: blur(16px);
  border-radius: 16px;
  border: 2px solid #c9a96e;
  z-index: 30;
  overflow: hidden;
  transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
  color: #e8dcc8;
  max-height: 58px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
}
.route-panel::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0;
  height: 3px; background: linear-gradient(90deg, #c9a96e, #f0d78c, #c9a96e);
}
.route-panel.collapsed { max-height: 58px; }
.route-panel:not(.collapsed) {
  max-height: 85vh;
  animation: panelExpand 0.4s cubic-bezier(0.4,0,0.2,1);
}
@keyframes panelExpand {
  from { opacity: 0.8; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}
.route-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 18px;
  cursor: pointer;
  border-bottom: 1px solid rgba(201,169,110,0.2);
}
.route-header h3 {
  margin: 0; font-size: 1.05rem;
  color: #f0d78c;
  letter-spacing: 2px;
  font-weight: 600;
}
#toggle-route {
  background: none; border: none;
  color: #c9a96e; cursor: pointer;
  font-size: 0.85rem; transition: transform 0.3s;
}
.route-panel:not(.collapsed) #toggle-route { transform: rotate(180deg); }
.route-body {
  padding: 14px 18px;
  overflow-y: auto;
  max-height: calc(85vh - 58px);
}

.route-inputs {
  display: flex; gap: 8px; margin-bottom: 14px;
  flex-wrap: wrap; align-items: center;
}
.route-inputs select {
  flex: 1; min-width: 110px;
  background: linear-gradient(180deg, #1a3048, #0d1b2a);
  color: #e8dcc8;
  border: 1.5px solid #c9a96e;
  border-radius: 10px;
  padding: 8px 10px;
  font-size: 0.85rem;
  font-family: inherit;
  cursor: pointer;
  outline: none;
  transition: all 0.2s;
}
.route-inputs select:focus {
  border-color: #f0d78c;
  box-shadow: 0 0 12px rgba(201,169,110,0.2);
}
.route-inputs select option {
  background: #1a3048;
  color: #e8dcc8;
}
.route-arrow {
  color: #c9a96e; font-size: 1.2rem;
  animation: arrowPulse 2s infinite;
}
@keyframes arrowPulse {
  0%, 100% { opacity: 0.6; transform: translateX(0); }
  50% { opacity: 1; transform: translateX(3px); }
}

/* ===== 路线结果 ===== */
.route-summary {
  display: flex; justify-content: space-around;
  padding: 16px 0;
  border-bottom: 1px solid rgba(201,169,110,0.15);
  margin-bottom: 14px;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.05), transparent);
  border-radius: 12px;
}
.summary-item { text-align: center; }
.summary-item .big {
  font-size: 1.8rem; font-weight: bold;
  color: #f0d78c;
  display: block;
  text-shadow: 0 2px 8px rgba(201,169,110,0.3);
}
.summary-item span {
  font-size: 1.3rem; font-weight: bold;
  display: block; color: #e8dcc8;
}
.summary-item small {
  font-size: 0.72rem; opacity: 0.6; color: #b8a88a;
}

.route-steps {
  display: flex; flex-direction: column; gap: 0;
}
.step {
  display: flex; gap: 12px;
  align-items: flex-start;
  padding: 10px 0;
  position: relative;
  animation: stepIn 0.3s ease-out both;
}
@keyframes stepIn {
  from { opacity: 0; transform: translateX(-15px); }
  to { opacity: 1; transform: translateX(0); }
}
.step-icon {
  width: 28px; height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: #fff;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  position: relative;
  z-index: 2;
}
.step-line-vert {
  width: 3px;
  flex-shrink: 0;
  margin-left: 12px;
  min-height: 30px;
  border-radius: 2px;
  position: relative;
}
.step-body { flex: 1; }
.step-title {
  font-size: 0.92rem;
  margin-bottom: 3px;
  line-height: 1.4;
  color: #e8dcc8;
}
.step-title b { color: #f0d78c; }
.step-meta {
  font-size: 0.78rem;
  opacity: 0.65;
  color: #b8a88a;
}
.step-board .step-icon {
  background: transparent;
  border: 3px solid;
  animation: iconGlow 2s infinite;
}
@keyframes iconGlow {
  0%, 100% { box-shadow: 0 0 5px currentColor; }
  50% { box-shadow: 0 0 15px currentColor, 0 0 25px currentColor; }
}
.step-transfer .step-icon {
  background: linear-gradient(135deg, #4a3a2a, #3a2a1a);
  border: 2px solid #c9a96e;
}

/* ===== 站点弹窗 - 原神风格 ===== */
.station-popup {
  position: absolute;
  background: linear-gradient(180deg, rgba(13,27,42,0.95) 0%, rgba(20,35,50,0.92) 100%);
  backdrop-filter: blur(20px);
  border: 2px solid #c9a96e;
  border-radius: 16px;
  padding: 0;
  z-index: 100;
  min-width: 320px;
  max-width: 380px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,169,110,0.1);
  animation: popupIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
  transform-origin: top center;
  overflow: hidden;
}
@keyframes popupIn {
  from { opacity: 0; transform: scale(0.85) translateY(-20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}
.popup-header {
  padding: 14px 18px;
  border-bottom: 1px solid rgba(201,169,110,0.2);
  display: flex; justify-content: space-between; align-items: center;
  background: linear-gradient(90deg, rgba(201,169,110,0.1), transparent);
}
.popup-title {
  font-size: 1.15rem;
  color: #f0d78c;
  font-weight: 600;
  letter-spacing: 2px;
}
.popup-en {
  font-size: 0.75rem;
  color: #a09070;
  margin-top: 2px;
  font-style: italic;
}
.popup-close {
  background: none; border: none;
  color: #c9a96e; font-size: 1.3rem;
  cursor: pointer;
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.popup-close:hover {
  background: rgba(201,169,110,0.15);
  color: #f0d78c;
  transform: rotate(90deg);
}
.popup-body {
  padding: 12px 18px 16px;
  max-height: 400px;
  overflow-y: auto;
}
.popup-section-title {
  font-size: 0.8rem;
  color: #c9a96e;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin: 12px 0 8px;
  padding-left: 8px;
  border-left: 3px solid #c9a96e;
}
.popup-line-item {
  display: flex; align-items: center;
  gap: 10px;
  padding: 8px 12px;
  margin: 4px 0;
  border-radius: 10px;
  background: rgba(255,255,255,0.03);
  transition: all 0.2s;
  cursor: pointer;
}
.popup-line-item:hover {
  background: rgba(201,169,110,0.1);
  transform: translateX(4px);
}
.popup-line-badge {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: bold;
  color: #fff;
  flex-shrink: 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}
.popup-line-info { flex: 1; }
.popup-line-name {
  font-size: 0.88rem;
  color: #e8dcc8;
  font-weight: 500;
}
.popup-line-dir {
  font-size: 0.72rem;
  color: #a09070;
  margin-top: 1px;
}
.popup-time {
  text-align: right;
  white-space: nowrap;
}
.popup-time-badge {
  background: linear-gradient(135deg, #c9a96e, #a08050);
  color: #0d1b2a;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 0.82rem;
  font-weight: bold;
  display: inline-block;
}
.popup-time-badge.off {
  background: linear-gradient(135deg, #555, #444);
  color: #888;
}
.popup-time-detail {
  font-size: 0.68rem;
  color: #a09070;
  margin-top: 2px;
}
.popup-transfer-tag {
  display: inline-block;
  background: linear-gradient(135deg, rgba(201,169,110,0.2), rgba(201,169,110,0.1));
  color: #f0d78c;
  padding: 2px 8px;
  border-radius: 8px;
  font-size: 0.7rem;
  margin-left: 8px;
  border: 1px solid rgba(201,169,110,0.3);
}

/* ===== 线路抽屉 - 原神风格 ===== */
.line-drawer {
  position: fixed; top: 0; right: 0; bottom: 0;
  width: 420px;
  background: linear-gradient(180deg, rgba(13,27,42,0.96) 0%, rgba(20,35,50,0.94) 100%);
  backdrop-filter: blur(20px);
  border-left: 3px solid #c9a96e;
  z-index: 40;
  transform: translateX(105%);
  transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column;
  color: #e8dcc8;
  box-shadow: -8px 0 40px rgba(0,0,0,0.5);
}
.line-drawer.open {
  transform: translateX(0);
  animation: drawerSlide 0.4s cubic-bezier(0.4,0,0.2,1);
}
@keyframes drawerSlide {
  from { transform: translateX(105%); }
  to { transform: translateX(0); }
}
.drawer-header {
  display: flex; align-items: center; gap: 12px;
  padding: 18px 20px;
  border-bottom: 2px solid rgba(201,169,110,0.2);
  background: linear-gradient(90deg, rgba(201,169,110,0.08), transparent);
}
.drawer-color {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: inline-block;
  border: 3px solid #fff;
  box-shadow: 0 0 15px currentColor, 0 4px 10px rgba(0,0,0,0.3);
  animation: colorPulse 3s infinite;
}
@keyframes colorPulse {
  0%, 100% { box-shadow: 0 0 15px currentColor; }
  50% { box-shadow: 0 0 25px currentColor, 0 0 40px currentColor; }
}
.drawer-header h3 {
  margin: 0; flex: 1;
  font-size: 1.2rem;
  color: #f0d78c;
  letter-spacing: 2px;
  font-weight: 600;
}
#close-drawer {
  background: none; border: none;
  color: #c9a96e; font-size: 1.4rem;
  cursor: pointer;
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
}
#close-drawer:hover {
  background: rgba(201,169,110,0.15);
  color: #f0d78c;
  transform: rotate(90deg);
}
.drawer-tabs {
  display: flex;
  border-bottom: 1px solid rgba(201,169,110,0.15);
}
.tab-btn {
  flex: 1; background: none; border: none;
  color: #a09070; padding: 12px;
  cursor: pointer; font-size: 0.88rem;
  opacity: 0.7;
  border-bottom: 3px solid transparent;
  transition: all 0.3s;
  font-family: inherit;
  letter-spacing: 1px;
}
.tab-btn:hover { opacity: 1; color: #c9a96e; }
.tab-btn.active {
  opacity: 1;
  border-bottom-color: #f0d78c;
  color: #f0d78c;
  font-weight: 600;
  background: linear-gradient(180deg, transparent, rgba(201,169,110,0.05));
}
.drawer-content {
  flex: 1; overflow-y: auto;
  padding: 8px 0;
}
.drawer-footer {
  padding: 12px 20px;
  border-top: 1px solid rgba(201,169,110,0.15);
  font-size: 0.72rem;
  opacity: 0.7;
  text-align: center;
  color: #a09070;
  background: linear-gradient(90deg, transparent, rgba(201,169,110,0.03), transparent);
}

/* 抽屉内站点行 */
.drawer-station-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 20px;
  border-bottom: 1px solid rgba(201,169,110,0.08);
  transition: all 0.2s;
  position: relative;
}
.drawer-station-row:hover {
  background: rgba(201,169,110,0.06);
}
.drawer-station-row::before {
  content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 3px; height: 0;
  background: #c9a96e;
  transition: height 0.2s;
  border-radius: 0 2px 2px 0;
}
.drawer-station-row:hover::before { height: 60%; }
.drawer-station-info { flex: 1; }
.drawer-station-name {
  font-size: 0.95rem;
  font-weight: 500;
  color: #e8dcc8;
}
.drawer-station-en {
  font-size: 0.72rem;
  color: #a09070;
  margin-top: 2px;
  font-style: italic;
}
.drawer-station-time {
  text-align: right; white-space: nowrap; margin-left: 10px;
}
.drawer-time-badge {
  background: linear-gradient(135deg, #c9a96e, #a08050);
  color: #0d1b2a;
  padding: 3px 12px;
  border-radius: 14px;
  font-size: 0.85rem;
  font-weight: bold;
  display: inline-block;
  box-shadow: 0 2px 8px rgba(201,169,110,0.3);
}
.drawer-time-badge.off {
  background: linear-gradient(135deg, #444, #333);
  color: #777;
  box-shadow: none;
}
.drawer-time-detail {
  font-size: 0.7rem;
  color: #a09070;
  margin-top: 3px;
}

/* ===== 图例面板 - 原神风格 ===== */
.legend-panel {
  position: fixed; bottom: 24px; right: 24px;
  background: linear-gradient(180deg, rgba(13,27,42,0.9) 0%, rgba(20,35,50,0.85) 100%);
  backdrop-filter: blur(12px);
  padding: 12px 18px;
  border-radius: 16px;
  font-size: 0.78rem;
  color: #e8dcc8;
  display: flex; gap: 12px;
  z-index: 25;
  border: 2px solid #c9a96e;
  flex-wrap: wrap;
  max-width: 90vw;
  overflow-x: auto;
  align-items: center;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.legend-item {
  display: inline-flex; align-items: center; gap: 8px;
  cursor: pointer;
  transition: all 0.25s;
  padding: 6px 10px;
  border-radius: 10px;
  user-select: none;
  border: 1px solid transparent;
}
.legend-item:hover {
  background: rgba(201,169,110,0.12);
  border-color: rgba(201,169,110,0.3);
  transform: translateY(-2px) scale(1.03);
  box-shadow: 0 4px 12px rgba(201,169,110,0.15);
}
.legend-color {
  width: 22px; height: 14px;
  border-radius: 20px;
  display: inline-block;
  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.legend-circle {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #333;
  display: inline-block;
  border: 1.5px solid rgba(255,255,255,0.4);
}

/* ===== 空状态 ===== */
.route-empty {
  text-align: center; padding: 30px 20px;
  opacity: 0.6;
  font-size: 0.9rem;
  color: #a09070;
}

/* ===== 加载动画 ===== */
.loading-ring {
  display: inline-block;
  width: 20px; height: 20px;
  border: 2px solid rgba(201,169,110,0.3);
  border-top-color: #c9a96e;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== 滚动条美化 ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: rgba(201,169,110,0.3);
  border-radius: 3px;
}
::-webkit-scrollbar-thumb:hover { background: rgba(201,169,110,0.5); }

/* ===== 响应式 ===== */
@media (max-width: 768px) {
  .route-panel { width: calc(100vw - 32px); left: 16px; }
  .line-drawer { width: 100vw; }
  .legend-panel {
    bottom: 10px; right: 10px; left: 10px;
    max-width: none; justify-content: center;
  }
  .toolbar { padding: 8px 12px; }
  .title h1 { font-size: 1.1rem; }
}

</style>
</head>
<body>

<div class="toolbar">
  <div class="title">
    <h1>🌟 提瓦特轨道交通网</h1>
    <small>· 七国联动 · 实时导航 · 提瓦特风格</small>
  </div>
  <div class="controls">
    <button class="genshin-btn" id="zoom-in">➕ 放大</button>
    <button class="genshin-btn" id="zoom-out">➖ 缩小</button>
    <button class="genshin-btn" id="reset-view">⟳ 重置</button>
    <label class="genshin-btn file-label" for="jsonUpload">📂 上传JSON</label>
    <input type="file" id="jsonUpload" accept=".json">
    <div class="clock" id="clock">北京时间 --:--:--</div>
  </div>
</div>

<div id="route-panel" class="route-panel collapsed">
  <div class="route-header">
    <h3>🧭 路线规划</h3>
    <button id="toggle-route">▼</button>
  </div>
  <div class="route-body">
    <div class="route-inputs">
      <select id="start-station"><option value="">选择起点</option></select>
      <span class="route-arrow">→</span>
      <select id="end-station"><option value="">选择终点</option></select>
      <button class="genshin-btn" id="search-route">查询</button>
    </div>

function getEdgeColor(attrs) {
  if (attrs['single-color']) return attrs['single-color'].color[2];
  if (attrs['mtr-light-rail']) return attrs['mtr-light-rail'].color[2];
  return '#aaaaaa';
}
function getNodeName(node) {
  const attr = node.attributes || node;
  const type = attr.type;
  const conf = attr[type] || attr['bjsubway-int'] || attr['bjsubway-basic'] || attr['shmetro-basic'] || {};
  return conf.names || ['未知道站', ''];
}
function getBeijingNow() {
  const now = new Date();
  const utc = now.getTime() + now.getTimezoneOffset() * 60000;
  return new Date(utc + 3600000 * 8);
}
function getInterval(hour) {
  if ((hour >= 7 && hour < 9) || (hour >= 17 && hour < 19)) return 6;
  if ((hour >= 9 && hour < 17) || (hour >= 19 && hour < 21)) return 10;
  if (hour >= 21 && hour < 23) return 12;
  return null;
}
function formatTime(minutes) {
  const h = Math.floor(minutes / 60) % 24;
  const m = Math.floor(minutes % 60);
  return (h<10?'0':'') + h + ':' + (m<10?'0':'') + m;
}

// ===== 单程线配置 =====
const ONE_WAY_LINES = {
  '#f39173': { start: 'stn_Un9znIAElQ', name: '1号线' },   // 纳塔西站始发
  '#9ac6c7': { start: 'stn_jSKacdj6LR', name: '2号线' }     // 蒙德城始发
};

function isOneWayLine(color) {
  return !!ONE_WAY_LINES[color];
}

function getOneWayStart(color) {
  return ONE_WAY_LINES[color]?.start;
}

function buildGraph(subwayData) {
  const nodes = subwayData.graph.nodes.filter(n => n.attributes.visible);
  const edges = subwayData.graph.edges.filter(e => e.attributes.visible);
  const nodeMap = {};
  const stationLines = {};
  const adj = {};
  nodes.forEach(n => { nodeMap[n.key] = n.attributes; adj[n.key] = []; });
  edges.forEach(e => {
    const c = getEdgeColor(e.attributes);
    if (!c) return;
    if (!stationLines[e.source]) stationLines[e.source] = new Set();
    if (!stationLines[e.target]) stationLines[e.target] = new Set();
    stationLines[e.source].add(c);
    stationLines[e.target].add(c);
    adj[e.source].push({node: e.target, color: c, edge: e});
    adj[e.target].push({node: e.source, color: c, edge: e});
  });

  const colorEdges = {};
  edges.forEach(e => {
    const c = getEdgeColor(e.attributes);
    if (!colorEdges[c]) colorEdges[c] = [];
    colorEdges[c].push(e);
  });
  const lineSequences = {};
  const lineNameMap = {};
  const lineBadgeMap = {};
  nodes.forEach(n => {
    const t = n.attributes.type;
    if (t === 'bjsubway-num-line-badge' || t === 'berlin-s-bahn-line-badge') {
      const badge = n.attributes[t];
      if (badge && badge.color) { lineNameMap[badge.color[2]] = badge.num + '号线'; lineBadgeMap[badge.color[2]] = badge; }
    } else if (t === 'gzmtr-line-badge') {
      const badge = n.attributes[t];
      if (badge && badge.color) { lineNameMap[badge.color[2]] = badge.names[0]; lineBadgeMap[badge.color[2]] = badge; }
    }
  });

  for (const [color, es] of Object.entries(colorEdges)) {
    const localAdj = {};
    es.forEach(e => {
      if (!localAdj[e.source]) localAdj[e.source] = [];
      if (!localAdj[e.target]) localAdj[e.target] = [];
      localAdj[e.source].push(e.target);
      localAdj[e.target].push(e.source);
    });

    // 单程线处理：从始发站单向遍历
    if (isOneWayLine(color)) {
      const startKey = getOneWayStart(color);
      const seq = [];
      const visited = new Set();
      let cur = startKey;
      while (cur) {
        seq.push(cur);
        visited.add(cur);
        const nexts = localAdj[cur].filter(n => !visited.has(n));
        cur = nexts[0] || null;
      }
      lineSequences[color] = seq;
    } else {
      // 普通双向线：找端点
      const degrees = {};
      Object.entries(localAdj).forEach(([k,v]) => degrees[k] = v.length);
      const ends = Object.entries(degrees).filter(([k,v]) => v === 1).map(([k]) => k);
      let seq = [];
      if (ends.length >= 2) {
        const start = ends[0];
        const visited = new Set();
        let cur = start;
        while (cur) {
          seq.push(cur);
          visited.add(cur);
          const nexts = localAdj[cur].filter(n => !visited.has(n));
          cur = nexts[0] || null;
        }
      } else if (ends.length === 0 && es.length > 0) {
        const start = es[0].source;
        const visited = new Set();
        let cur = start;
        while (cur) {
          seq.push(cur);
          visited.add(cur);
          const nexts = localAdj[cur].filter(n => !visited.has(n));
          if (nexts.length === 0) break;
          cur = nexts[0];
        }
      }
      lineSequences[color] = seq;
    }
  }
  return {nodes, edges, nodeMap, adj, stationLines, lineSequences, lineNameMap, lineBadgeMap};
}

// 获取单程线的方向信息
function getOneWayDirection(color, stationKey, lineSequences) {
  const seq = lineSequences[color];
  if (!seq || !seq.length) return null;
  const idx = seq.indexOf(stationKey);
  if (idx === -1) return null;
  // 单程线只有一个方向：从始发站往后
  if (idx < seq.length - 1) {
    const nextStation = seq[idx + 1];
    return { direction: 1, nextStation, terminal: seq[seq.length - 1] };
  }
  return null; // 终点站，无后续方向
}

function getNextTrains(lineColor, stationKey, direction, lineSequences) {
  const seq = lineSequences[lineColor];
  if (!seq || !seq.length) return [];
  const idx = seq.indexOf(stationKey);
  if (idx === -1) return [];

  const now = getBeijingNow();
  const currentMin = now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
  const startDay = 7 * 60;
  const endDay = 23 * 60;

  // 单程线：只能从始发站方向来
  if (isOneWayLine(lineColor)) {
    // 如果当前站在始发站之前（按序列），说明不能从该方向来
    const startKey = getOneWayStart(lineColor);
    const startIdx = seq.indexOf(startKey);
    // 单程线只能往一个方向走，travel 是从始发站到当前站的累计时间
    const travel = (idx - startIdx) * 2;
    if (currentMin < startDay) {
      const arr = startDay + travel;
      return [{departure: startDay, arrival: arr, wait: arr - currentMin}];
    }
    if (currentMin >= endDay) return [];
    const hour = Math.floor(currentMin / 60);
    const interval = getInterval(hour);
    if (!interval) return [];
    const minN = Math.ceil((currentMin - travel - startDay) / interval);
    const trains = [];
    for (let n = minN; n < minN + 6; n++) {
      const dep = startDay + n * interval;
      if (dep >= endDay) break;
      const arr = dep + travel;
      if (arr >= currentMin) trains.push({departure: dep, arrival: arr, wait: arr - currentMin});
    }
    return trains;
  }

  // 普通双向线
  const travel = direction === 1 ? idx * 2 : (seq.length - 1 - idx) * 2;
  if (currentMin < startDay) {
    const arr = startDay + travel;
    return [{departure: startDay, arrival: arr, wait: arr - currentMin}];
  }
  if (currentMin >= endDay) return [];
  const hour = Math.floor(currentMin / 60);
  const interval = getInterval(hour);
  if (!interval) return [];
  const minN = Math.ceil((currentMin - travel - startDay) / interval);
  const trains = [];
  for (let n = minN; n < minN + 6; n++) {
    const dep = startDay + n * interval;
    if (dep >= endDay) break;
    const arr = dep + travel;
    if (arr >= currentMin) trains.push({departure: dep, arrival: arr, wait: arr - currentMin});
  }
  return trains;
}

class PriorityQueue {
  constructor(cmp) { this.heap = []; this.cmp = cmp || ((a,b) => a.dist < b.dist); }
  push(v) { this.heap.push(v); this.heap.sort((a,b) => this.cmp(a,b) ? -1 : 1); }
  pop() { return this.heap.shift(); }
  isEmpty() { return !this.heap.length; }
}

function findRoute(startKey, endKey, adj, stationLines) {
  if (startKey === endKey) return {path: [{station: startKey, line: null}], time: 0};
  const startColors = Array.from(stationLines[startKey] || []);
  if (!startColors.length) return null;
  const pq = new PriorityQueue();
  const dist = new Map();
  const prev = new Map();
  startColors.forEach(c => {
    const k = startKey + '|' + c;
    dist.set(k, 0);
    pq.push({station: startKey, line: c, dist: 0});
  });
  while (!pq.isEmpty()) {
    const cur = pq.pop();
    const ck = cur.station + '|' + cur.line;
    if ((dist.get(ck) || Infinity) < cur.dist) continue;
    for (const nb of (adj[cur.station] || [])) {
      if (nb.color !== cur.line) continue;
      // 单程线检查：只能沿单向行驶
      if (isOneWayLine(cur.line)) {
        const seq = window._subwayGraph.lineSequences[cur.line];
        const startIdx = seq.indexOf(getOneWayStart(cur.line));
        const fromIdx = seq.indexOf(cur.station);
        const toIdx = seq.indexOf(nb.node);
        // 只能往索引增大的方向走（从始发站往后）
        if (toIdx <= fromIdx) continue;
      }
      const nd = cur.dist + 2;
      const nk = nb.node + '|' + cur.line;
      if ((dist.get(nk) || Infinity) > nd) {
        dist.set(nk, nd);
        prev.set(nk, {station: cur.station, line: cur.line});
        pq.push({station: nb.node, line: cur.line, dist: nd});
      }
    }
    const colors = Array.from(stationLines[cur.station] || []);
    for (const c of colors) {
      if (c === cur.line) continue;
      const nd = cur.dist + 5;
      const nk = cur.station + '|' + c;
      if ((dist.get(nk) || Infinity) > nd) {
        dist.set(nk, nd);
        prev.set(nk, {station: cur.station, line: cur.line});
        pq.push({station: cur.station, line: c, dist: nd});
      }
    }
  }
  let bestLine = null, bestDist = Infinity;
  for (const c of Array.from(stationLines[endKey] || [])) {
    const k = endKey + '|' + c;
    if (dist.has(k) && dist.get(k) < bestDist) { bestDist = dist.get(k); bestLine = c; }
  }
  if (!bestLine) return null;
  const path = [];
  let cur = {station: endKey, line: bestLine};
  while (true) {
    path.unshift(cur);
    if (cur.station === startKey && startColors.includes(cur.line)) break;
    const k = cur.station + '|' + cur.line;
    const p = prev.get(k);
    if (!p) break;
    cur = p;
  }
  return {path, time: bestDist};
}

function getPerpPath(x1, y1, x2, y2, r) {
  const dx = x2 - x1, dy = y2 - y1;
  r = Math.min(r || 12, Math.abs(dx) / 2, Math.abs(dy) / 2) || 0;
  const sx = dx > 0 ? 1 : -1, sy = dy > 0 ? 1 : -1;
  if (Math.abs(dx) > Math.abs(dy)) {
    return `M ${x1} ${y1} L ${x2 - sx * r} ${y1} Q ${x2} ${y1} ${x2} ${y1 + sy * r} L ${x2} ${y2}`;
  } else {
    return `M ${x1} ${y1} L ${x1} ${y2 - sy * r} Q ${x1} ${y2} ${x1 + sx * r} ${y2} L ${x2} ${y2}`;
  }
}

function renderMap(data) {
  const container = document.getElementById('map-container');
  container.innerHTML = '';
  const svgNS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.style.width = '100%'; svg.style.height = '100%';
  container.appendChild(svg);

  const graph = buildGraph(data);
  const {nodes, edges, nodeMap, adj, stationLines, lineSequences, lineNameMap, lineBadgeMap} = graph;
  window._subwayGraph = graph;

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  nodes.forEach(n => {
    const {x, y} = n.attributes;
    minX = Math.min(minX, x); minY = Math.min(minY, y);
    maxX = Math.max(maxX, x); maxY = Math.max(maxY, y);
  });
  const pad = 120;
  svg.setAttribute('viewBox', `${minX - pad} ${minY - pad} ${maxX - minX + pad * 2} ${maxY - minY + pad * 2}`);
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  // 背景
  const bg = document.createElementNS(svgNS, 'rect');
  bg.setAttribute('x', minX - pad); bg.setAttribute('y', minY - pad);
  bg.setAttribute('width', maxX - minX + pad * 2); bg.setAttribute('height', maxY - minY + pad * 2);
  bg.setAttribute('fill', '#c8bfa0');
  svg.appendChild(bg);

  // 区域标签
  const regions = [
    {name: '蒙德', x: 300, y: -200}, {name: '璃月', x: 100, y: 180},
    {name: '须弥', x: -300, y: 200}, {name: '枫丹', x: -80, y: -220},
    {name: '纳塔', x: -600, y: 250}, {name: '稻妻', x: 550, y: 220}
  ];
  regions.forEach(r => {
    const t = document.createElementNS(svgNS, 'text');
    t.setAttribute('x', r.x); t.setAttribute('y', r.y);
    t.textContent = r.name;
    t.setAttribute('fill', '#7a5a3a');
    t.setAttribute('font-size', '24');
    t.setAttribute('font-weight', 'bold');
    t.setAttribute('opacity', '0.12');
    t.setAttribute('text-anchor', 'middle');
    t.setAttribute('font-family', 'Noto Serif SC, serif');
    svg.appendChild(t);
  });

  // 绘制线路
  edges.forEach(e => {
    const src = nodeMap[e.source], tgt = nodeMap[e.target];
    if (!src || !tgt) return;
    const color = getEdgeColor(e.attributes);
    let x1 = src.x, y1 = src.y, x2 = tgt.x, y2 = tgt.y;
    if (e.attributes.parallelIndex && e.attributes.parallelIndex !== 0) {
      const dx = x2 - x1, dy = y2 - y1, len = Math.sqrt(dx*dx + dy*dy) || 1;
      const nx = -dy / len, ny = dx / len;
      const off = e.attributes.parallelIndex * 3.5;
      x1 += nx * off; y1 += ny * off; x2 += nx * off; y2 += ny * off;
    }
    let d = '';
    if (e.attributes.type === 'perpendicular') {
      d = getPerpPath(x1, y1, x2, y2, e.attributes.perpendicular?.roundCornerFactor || 12);
    } else {
      d = `M ${x1} ${y1} L ${x2} ${y2}`;
    }
    const p = document.createElementNS(svgNS, 'path');
    p.setAttribute('d', d); p.setAttribute('stroke', color);
    p.setAttribute('stroke-width', '3.5'); p.setAttribute('fill', 'none');
    p.setAttribute('stroke-linecap', 'round'); p.setAttribute('stroke-linejoin', 'round');
    p.setAttribute('opacity', '0.9');
    svg.appendChild(p);
  });

  // 绘制站点
  nodes.forEach(node => {
    const attr = node.attributes;
    const {x, y} = attr;
    const type = attr.type;
    const isTransfer = type === 'bjsubway-int';
    const isBasic = type === 'bjsubway-basic' || type === 'shmetro-basic';
    if (isBasic || isTransfer) {

      const offY = conf.nameOffsetY || 'top';

      g.onclick = (ev) => {
        ev.stopPropagation();
        showStationPopup(node.key, x, y);
      };

      g.onmouseenter = () => {
        const circles = g.querySelectorAll('circle');
        circles.forEach(c => {
          c.setAttribute('r', parseFloat(c.getAttribute('r')) + 2);
          c.style.transition = 'r 0.2s';
        });
      };
      g.onmouseleave = () => {
        const circles = g.querySelectorAll('circle');
        if (isTransfer) {
          circles[0].setAttribute('r', 8);
          circles[1].setAttribute('r', 4);
        } else {
          circles[0].setAttribute('r', 5);
        }
      };

      if (isTransfer) {
        const outer = document.createElementNS(svgNS, 'circle');
        outer.setAttribute('cx', x); outer.setAttribute('cy', y); outer.setAttribute('r', 8);
        outer.setAttribute('fill', '#fff');
        outer.setAttribute('stroke', '#2c3e44');
        outer.setAttribute('stroke-width', '2.5');
        g.appendChild(outer);
        const inner = document.createElementNS(svgNS, 'circle');
        inner.setAttribute('cx', x); inner.setAttribute('cy', y); inner.setAttribute('r', 4);
        inner.setAttribute('fill', '#2c3e44');
        g.appendChild(inner);
      } else {
        const c = document.createElementNS(svgNS, 'circle');
        c.setAttribute('cx', x); c.setAttribute('cy', y); c.setAttribute('r', 5);
        c.setAttribute('fill', '#2d3748');
        c.setAttribute('stroke', '#cbd5e1');
        c.setAttribute('stroke-width', '1.5');
        g.appendChild(c);
      }

      let dx = 10, dy = -10;
      if (offX === 'left') dx = -10;
      if (offX === 'right') dx = 10;
      if (offX === 'middle') dx = 0;
      if (offY === 'top') dy = -10;
      if (offY === 'bottom') dy = 14;
      if (offY === 'middle') dy = 4;

      const text = document.createElementNS(svgNS, 'text');
      text.setAttribute('x', x + dx); text.setAttribute('y', y + dy);
      text.textContent = nameCn;
      text.setAttribute('font-size', '11');
      text.setAttribute('font-weight', '600');
      text.setAttribute('fill', '#1e2a2f');
      text.setAttribute('stroke', '#fff6e8');
      text.setAttribute('stroke-width', '0.5');
      text.setAttribute('paint-order', 'stroke');
      text.setAttribute('dominant-baseline', 'hanging');
      if (offX === 'middle') text.setAttribute('text-anchor', 'middle');
      else if (offX === 'left') text.setAttribute('text-anchor', 'end');
      g.appendChild(text);

      if (nameEn) {
        const en = document.createElementNS(svgNS, 'text');
        en.setAttribute('x', x + dx); en.setAttribute('y', y + dy + 12);
        en.textContent = nameEn;
        en.setAttribute('font-size', '7.5');
        en.setAttribute('fill', '#5a6b72');
        en.setAttribute('dominant-baseline', 'hanging');
        if (offX === 'middle') en.setAttribute('text-anchor', 'middle');
        else if (offX === 'left') en.setAttribute('text-anchor', 'end');
        g.appendChild(en);
      }

      const title = document.createElementNS(svgNS, 'title');
      title.textContent = nameCn + (nameEn ? '\n' + nameEn : '') + (isTransfer ? ' [换乘站]' : '');
      g.appendChild(title);
      svg.appendChild(g);
    } else if (type.includes('line-badge') || type === 'berlin-s-bahn-line-badge') {
      const badge = attr[type] || {};
      const g = document.createElementNS(svgNS, 'g');
      const circ = document.createElementNS(svgNS, 'circle');
      circ.setAttribute('cx', x); circ.setAttribute('cy', y); circ.setAttribute('r', 14);
      circ.setAttribute('fill', badge.color?.[2] || '#ccc');
      circ.setAttribute('stroke', '#fff'); circ.setAttribute('stroke-width', '2');
      g.appendChild(circ);
      const txt = document.createElementNS(svgNS, 'text');
      txt.setAttribute('x', x); txt.setAttribute('y', y);
      txt.setAttribute('text-anchor', 'middle'); txt.setAttribute('dominant-baseline', 'middle');
      txt.textContent = badge.num || (badge.names ? badge.names[0] : '?');

      txt.setAttribute('font-weight', 'bold'); txt.setAttribute('font-size', '12');
      g.appendChild(txt);
      svg.appendChild(g);
    } else if (type === 'facilities') {
      const rect = document.createElementNS(svgNS, 'rect');
      rect.setAttribute('x', x - 8); rect.setAttribute('y', y - 4);
      rect.setAttribute('width', 16); rect.setAttribute('height', 8);
      rect.setAttribute('fill', '#6b5a4c'); rect.setAttribute('rx', '2');
      svg.appendChild(rect);
    }
  });

  svg.addEventListener('click', (e) => {
    if (e.target === svg || e.target === bg) closeStationPopup();
  });

  return svg;
}

let currentCleanup = null;
function attachPanZoom(svgElem) {
  if (currentCleanup) currentCleanup();
  let isPan = false, start = {x:0,y:0}, vb = {x:0,y:0,w:0,h:0};
  const getVB = () => svgElem.getAttribute('viewBox').split(' ').map(Number);
  const setVB = (arr) => svgElem.setAttribute('viewBox', arr.join(' '));
  const onWheel = (e) => {
    e.preventDefault();
    const rect = svgElem.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    let [x,y,w,h] = getVB();
    const factor = e.deltaY < 0 ? 0.9 : 1.1;
    const nw = w * factor, nh = h * factor;
    const fx = mx / rect.width, fy = my / rect.height;
    setVB([x + (w - nw) * fx, y + (h - nh) * fy, nw, nh]);
    if (activePopup) closeStationPopup();
  };
  const onMouseDown = (e) => {
    if (e.button !== 0) return;
    isPan = true;
    start = {x: e.clientX, y: e.clientY};
    let [x,y,w,h] = getVB();
    vb = {x,y,w,h};
    svgElem.style.cursor = 'grabbing';
    if (activePopup) closeStationPopup();
  };
  const onMouseMove = (e) => {
    if (!isPan) return;
    const dx = e.clientX - start.x, dy = e.clientY - start.y;
    const sx = vb.w / svgElem.clientWidth, sy = vb.h / svgElem.clientHeight;
    setVB([vb.x - dx * sx, vb.y - dy * sy, vb.w, vb.h]);
    start = {x: e.clientX, y: e.clientY};
    let [x,y,w,h] = getVB();
    vb = {x,y,w,h};
  };
  const onMouseUp = () => { isPan = false; svgElem.style.cursor = 'grab'; };
  svgElem.addEventListener('wheel', onWheel, {passive: false});
  svgElem.addEventListener('mousedown', onMouseDown);
  window.addEventListener('mousemove', onMouseMove);
  window.addEventListener('mouseup', onMouseUp);
  svgElem.style.cursor = 'grab';
  currentCleanup = () => {
    svgElem.removeEventListener('wheel', onWheel);
    svgElem.removeEventListener('mousedown', onMouseDown);
    window.removeEventListener('mousemove', onMouseMove);
    window.removeEventListener('mouseup', onMouseUp);
  };
}

function resetView(data) {

  const nodes = data.graph.nodes.filter(n => n.attributes.visible);

  const pad = 120;
  svg.setAttribute('viewBox', `${minX-pad} ${minY-pad} ${maxX-minX+pad*2} ${maxY-minY+pad*2}`);
}

function initUI() {
  const startSel = document.getElementById('start-station');
  const endSel = document.getElementById('end-station');
  startSel.innerHTML = '<option value="">选择起点</option>';
  endSel.innerHTML = '<option value="">选择终点</option>';
  const {nodes} = window._subwayGraph;
  const stations = nodes.filter(n => {
    const t = n.attributes.type;
    return t === 'bjsubway-basic' || t === 'bjsubway-int' || t === 'shmetro-basic';
  }).sort((a,b) => getNodeName(a)[0].localeCompare(getNodeName(b)[0], 'zh-CN'));
  stations.forEach(s => {
    const [cn] = getNodeName(s);
    const o1 = document.createElement('option'); o1.value = s.key; o1.textContent = cn; startSel.appendChild(o1);
    const o2 = document.createElement('option'); o2.value = s.key; o2.textContent = cn; endSel.appendChild(o2);
  });
  document.getElementById('search-route').onclick = () => {
    if (!startSel.value || !endSel.value) { alert('请选择起点和终点'); return; }
    searchRoute(startSel.value, endSel.value);
  };
  document.getElementById('toggle-route').onclick = () => {
    const p = document.getElementById('route-panel');
    p.classList.toggle('collapsed');
  };
  document.getElementById('close-drawer').onclick = () => {
    document.getElementById('line-drawer').classList.remove('open');
    if (drawerInterval) clearInterval(drawerInterval);
  };
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderLineDrawerContent(parseInt(btn.dataset.dir));
    };
  });
}

function renderLegend() {
  const {lineNameMap} = window._subwayGraph;
  const container = document.getElementById('legend-panel');
  const staticItems = Array.from(container.children).slice(0, 2);
  container.innerHTML = '';
  staticItems.forEach(el => container.appendChild(el));
  Object.entries(lineNameMap).forEach(([color, name]) => {
    const span = document.createElement('span');
    span.className = 'legend-item';
    span.dataset.color = color;
    const isOneWay = isOneWayLine(color);
    span.innerHTML = `<i class="legend-color" style="background:${color};"></i> ${name}${isOneWay ? ' <span style="font-size:0.65rem;color:#a08050;">(单程)</span>' : ''}`;
    span.onclick = () => openLineDrawer(color);
    container.appendChild(span);
  });
}

function openLineDrawer(color) {
  const {lineNameMap, lineSequences, nodeMap} = window._subwayGraph;
  const seq = lineSequences[color];
  if (!seq || !seq.length) return;
  window._currentLine = color;
  const isOneWay = isOneWayLine(color);
  document.getElementById('drawer-title').textContent = (lineNameMap[color] || '未知线路') + (isOneWay ? ' (单程线)' : '');
  document.getElementById('drawer-color').style.background = color;

  if (isOneWay) {
    // 单程线：只有一个方向标签
    const terminal = seq[seq.length - 1];
    const terminalName = getNodeName({attributes: nodeMap[terminal]})[0];
    document.getElementById('tab-end-0').textContent = terminalName;
    document.getElementById('tab-end-1').textContent = '--';
    document.querySelectorAll('.tab-btn')[0].style.display = 'flex';
    document.querySelectorAll('.tab-btn')[1].style.display = 'none';
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    renderLineDrawerContent(0);
  } else {
    // 双向线：两个方向标签
    const end0 = getNodeName({attributes: nodeMap[seq[0]]})[0];
    const end1 = getNodeName({attributes: nodeMap[seq[seq.length-1]]})[0];
    document.getElementById('tab-end-0').textContent = end0;
    document.getElementById('tab-end-1').textContent = end1;
    document.querySelectorAll('.tab-btn').forEach(b => b.style.display = 'flex');
    document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));
    renderLineDrawerContent(0);
  }

  document.getElementById('line-drawer').classList.add('open');
  if (drawerInterval) clearInterval(drawerInterval);
  drawerInterval = setInterval(() => {
    const active = document.querySelector('.tab-btn.active');
    if (active && window._currentLine) renderLineDrawerContent(parseInt(active.dataset.dir));
  }, 10000);
}

function renderLineDrawerContent(direction) {
  const color = window._currentLine;
  const {lineSequences, nodeMap} = window._subwayGraph;
  const seq = lineSequences[color];
  const container = document.getElementById('drawer-content');
  container.innerHTML = '';
  const isOneWay = isOneWayLine(color);

  seq.forEach((key, idx) => {
    const attr = nodeMap[key];
    const [cn, en] = getNodeName({attributes: attr});
    let trains;
    if (isOneWay) {
      // 单程线：只有一个方向
      trains = getNextTrains(color, key, 1, lineSequences);
    } else {
      trains = getNextTrains(color, key, direction, lineSequences);
    }
    const row = document.createElement('div');
    row.className = 'drawer-station-row';
    const info = document.createElement('div');
    info.className = 'drawer-station-info';
    info.innerHTML = `<div class="drawer-station-name">${cn}</div>${en ? `<div class="drawer-station-en">${en}</div>` : ''}`;
    const time = document.createElement('div');
    time.className = 'drawer-station-time';
    if (trains.length > 0) {
      const mins = Math.ceil(trains[0].wait);
      time.innerHTML = `<span class="drawer-time-badge">${mins} 分</span><div class="drawer-time-detail">${formatTime(Math.ceil(trains[0].arrival))} 到站</div>`;
    } else {
      time.innerHTML = `<span class="drawer-time-badge off">已停运</span>`;
    }
    row.appendChild(info);
    row.appendChild(time);
    container.appendChild(row);
  });
}

function searchRoute(startKey, endKey) {
  const {adj, stationLines, lineSequences, nodeMap, lineNameMap} = window._subwayGraph;
  const result = findRoute(startKey, endKey, adj, stationLines);
  const container = document.getElementById('route-result');
  if (!result) {
    container.innerHTML = '<div class="route-empty">未找到可行路线，请尝试其他站点</div>';
    return;
  }
  const segments = [];
  let cur = null;
  result.path.forEach((p, i) => {
    if (i === 0) {
      cur = {line: p.line, stations: [p.station]};
    } else {
      if (p.line === cur.line) cur.stations.push(p.station);
      else { segments.push(cur); cur = {line: p.line, stations: [p.station]}; }
    }
  });
  if (cur) segments.push(cur);

  const now = getBeijingNow();
  let currentMin = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;
  const schedule = [];
  segments.forEach((seg, idx) => {
    const line = seg.line;
    const sts = seg.stations;
    const from = sts[0], to = sts[sts.length-1];
    const count = sts.length - 1;
    const seq = lineSequences[line];
    const isOneWay = isOneWayLine(line);
    let dir, terminalName;

    if (isOneWay) {
      // 单程线：方向固定
      dir = 1;
      const terminal = seq[seq.length - 1];
      terminalName = getNodeName({attributes: nodeMap[terminal]})[0];
    } else {
      const idxFrom = seq.indexOf(from), idxTo = seq.indexOf(to);
      dir = idxTo > idxFrom ? 1 : 0;
      const terminal = dir === 1 ? seq[seq.length-1] : seq[0];
      terminalName = getNodeName({attributes: nodeMap[terminal]})[0];
    }

    const trains = getNextTrains(line, from, dir, lineSequences);
    let boardTime, waitMin;
    if (trains.length > 0) {
      boardTime = trains[0].arrival;
      waitMin = Math.max(0, Math.ceil(boardTime - currentMin));
    } else {
      boardTime = currentMin; waitMin = 0;
    }
    schedule.push({
      type: 'board', line, lineName: lineNameMap[line] || '未知线路',
      station: from, stationName: getNodeName({attributes: nodeMap[from]})[0],
      direction: terminalName, wait: waitMin, boardTime,
      isOneWay: isOneWay
    });
    const rideTime = count * 2;
    const arriveTime = boardTime + rideTime;
    schedule.push({
      type: 'ride', line, lineName: lineNameMap[line] || '未知线路',
      from, fromName: getNodeName({attributes: nodeMap[from]})[0],
      to, toName: getNodeName({attributes: nodeMap[to]})[0],
      count, rideTime, arriveTime
    });
    currentMin = arriveTime;
    if (idx < segments.length - 1) {
      currentMin += 5;
      schedule.push({type: 'transfer', station: to, stationName: getNodeName({attributes: nodeMap[to]})[0], wait: 5});
    }
  });

  const lastArrive = schedule[schedule.length-1].arriveTime;
  const totalTime = Math.ceil(lastArrive - (now.getHours()*60 + now.getMinutes() + now.getSeconds()/60));
  const totalStations = schedule.filter(s=>s.type==='ride').reduce((a,s)=>a+s.count, 0);
  const transferCount = schedule.filter(s=>s.type==='transfer').length;

  let html = `<div class="route-summary">
    <div class="summary-item"><span class="big">${totalTime}</span><small>分钟</small></div>
    <div class="summary-item"><span>${totalStations}</span><small>站</small></div>
    <div class="summary-item"><span>${transferCount}</span><small>换乘</small></div>
    <div class="summary-item"><span>${formatTime(Math.ceil(lastArrive))}</span><small>到达</small></div>
  </div><div class="route-steps">`;

  let stepDelay = 0;
  schedule.forEach((s, i) => {
    stepDelay += 0.08;
    if (s.type === 'board') {
      const oneWayTag = s.isOneWay ? '<span style="font-size:0.7rem;color:#a08050;margin-left:4px;">(单程)</span>' : '';
      html += `<div class="step step-board" style="animation-delay:${stepDelay}s">
        <div class="step-icon" style="border-color:${s.line}"></div>
        <div class="step-body">
          <div class="step-title">在 <b>${s.stationName}</b> 乘坐 <b style="color:${s.line}">${s.lineName}</b>${oneWayTag}（往${s.direction}）</div>
          <div class="step-meta">预计等待 <b>${s.wait} 分</b> · ${formatTime(Math.ceil(s.boardTime))} 到站</div>
        </div>
      </div>`;
    } else if (s.type === 'ride') {
      html += `<div class="step step-ride" style="animation-delay:${stepDelay}s">
        <div class="step-line-vert" style="background:${s.line}"></div>
        <div class="step-body">
          <div class="step-meta">经过 ${s.count} 站，约 ${s.rideTime} 分钟</div>
          <div class="step-title">到达 <b>${s.toName}</b> <span style="opacity:0.6;font-size:0.75rem;">${formatTime(Math.ceil(s.arriveTime))}</span></div>
        </div>
      </div>`;
    } else if (s.type === 'transfer') {
      html += `<div class="step step-transfer" style="animation-delay:${stepDelay}s">
        <div class="step-icon">↻</div>
        <div class="step-body">
          <div class="step-title">在 <b>${s.stationName}</b> 换乘</div>
          <div class="step-meta">站内换乘约 ${s.wait} 分钟</div>
        </div>
      </div>`;
    }
  });
  html += '</div>';
  container.innerHTML = html;
}

function loadAndRender(data) {
  const svg = renderMap(data);
  attachPanZoom(svg);
  initUI();
  renderLegend();
  document.getElementById('zoom-in').onclick = () => {
    const s = document.querySelector('#map-container svg');
    if (!s) return;
    let [x,y,w,h] = s.getAttribute('viewBox').split(' ').map(Number);
    let nw=w*0.85, nh=h*0.85;
    s.setAttribute('viewBox', `${x+(w-nw)/2} ${y+(h-nh)/2} ${nw} ${nh}`);
  };
  document.getElementById('zoom-out').onclick = () => {
    const s = document.querySelector('#map-container svg');
    if (!s) return;
    let [x,y,w,h] = s.getAttribute('viewBox').split(' ').map(Number);
    let nw=w*1.18, nh=h*1.18;
    s.setAttribute('viewBox', `${x+(w-nw)/2} ${y+(h-nh)/2} ${nw} ${nh}`);
  };
  document.getElementById('reset-view').onclick = () => resetView(data);
}

loadAndRender(defaultSubwayData);
document.getElementById('jsonUpload').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try { loadAndRender(JSON.parse(ev.target.result)); }
    catch(err) { alert('JSON解析失败: ' + err.message); }
  };
  reader.readAsText(file);
});
setInterval(() => {
  const now = getBeijingNow();
  document.getElementById('clock').textContent = '北京时间 ' + now.toTimeString().slice(0,8);
}, 1000);

</script>
